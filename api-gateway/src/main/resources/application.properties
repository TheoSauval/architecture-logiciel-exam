spring.application.name=api-gateway
spring.config.import=optional:configserver:http://localhost:8888
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.mvc.routes[0].id=room-service
spring.cloud.gateway.mvc.routes[0].uri=lb://room-service
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/rooms/**

spring.cloud.gateway.mvc.routes[1].id=member-service
spring.cloud.gateway.mvc.routes[1].uri=lb://member-service
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/members/**

spring.cloud.gateway.mvc.routes[2].id=reservation-service
spring.cloud.gateway.mvc.routes[2].uri=lb://reservation-service
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/reservations/**
