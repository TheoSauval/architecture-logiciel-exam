server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: room-service
            uri: lb://room-service
            predicates:
              - Path=/rooms/**
          - id: member-service
            uri: lb://member-service
            predicates:
              - Path=/members/**
          - id: reservation-service
            uri: lb://reservation-service
            predicates:
              - Path=/reservations/**
